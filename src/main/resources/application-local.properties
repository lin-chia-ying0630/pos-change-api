spring.flyway.locations=classpath:db/migration,classpath:db/local
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/main?serverTimezone=Asia/Taipei&characterEncoding=utf-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345678}
pos.security.enabled=${POS_SECURITY_ENABLED:true}
pos.security.require-https=${POS_SECURITY_REQUIRE_HTTPS:false}
pos.security.maker-username=${POS_MAKER_USERNAME:maker}
pos.security.maker-password=${POS_MAKER_PASSWORD:aaaaabbbbb12}
pos.security.reviewer-username=${POS_REVIEWER_USERNAME:reviewer}
pos.security.reviewer-password=${POS_REVIEWER_PASSWORD:bbbbbbccccc12}
