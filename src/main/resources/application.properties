spring.application.name=pos-change-api
server.port=8081
debug=false


# Spring DataSource Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Spring Jackson Configuration
spring.jackson.time-zone=GMT+8
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# POS Change Business Configuration
pos.change-case.zone-id=${CHANGE_CASE_ZONE_ID:Asia/Taipei}
pos.change-case.reservation-ttl=${CHANGE_CASE_RESERVATION_TTL:PT30M}

# POS Security and CORS Configuration
pos.security.enabled=${POS_SECURITY_ENABLED:true}
pos.security.require-https=${POS_SECURITY_REQUIRE_HTTPS:true}
pos.security.maker-username=${POS_MAKER_USERNAME:}
pos.security.maker-password=${POS_MAKER_PASSWORD:}
pos.security.reviewer-username=${POS_REVIEWER_USERNAME:}
pos.security.reviewer-password=${POS_REVIEWER_PASSWORD:}
pos.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:8080,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:8080}

# Reverse Proxy and Error Response Security
server.forward-headers-strategy=framework
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# Container and Kubernetes Health Check
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.alin.lin.dto,com.alin.lin.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.nologging.NoLoggingImpl

# Logging Configuration
logging.level.root=info
# 專案程式 debug
logging.level.com.alin.lin=info
# MyBatis mapper 相關
# 不使用 StdOutImpl 或 mapper debug，避免原始 Parameters 個資外洩。
# mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
logging.level.org.mybatis=info
logging.level.com.alin.lin.dao=info
# SQL log 統一由 MaskedSqlLogInterceptor 輸出，避免原始參數外洩。
logging.level.com.alin.lin.interceptor.MaskedSqlLogInterceptor=debug
# JDBC SQL 相關
logging.level.java.sql=info
logging.level.java.sql.Connection=info
logging.level.java.sql.Statement=info
logging.level.java.sql.PreparedStatement=info
